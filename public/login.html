<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Shavinder NEF</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .auth-container {
        max-width: 400px;
        margin: 100px auto;
        padding: 40px 20px;
        background: #161616;
        border-radius: 8px;
        text-align: center;
      }
      .auth-container h2 {
        margin-bottom: 20px;
      }
      .auth-container input {
        width: 100%;
        margin-bottom: 15px;
        padding: 12px;
        border-radius: 5px;
        background: #fff;
        color: #000;
        outline: none;
        border: none;
      }
      .auth-container button {
        width: 100%;
        padding: 12px;
        background: #e63946;
        color: #fff;
        border: none;
        border-radius: 5px;
        font-size: 1rem;
        cursor: pointer;
        font-weight: bold;
      }
      .toggle-text {
        margin-top: 20px;
        font-size: 0.9rem;
        color: #ccc;
        cursor: pointer;
      }
      .toggle-text span {
        color: #e63946;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="menu-btn" onclick="window.location.href = 'index.html'">
      ← Back to Site
    </div>

    <div class="auth-container">
      <h2 id="authTitle">Log In</h2>

      <form id="authForm" onsubmit="handleAuth(event)">
        <input
          type="text"
          id="authName"
          placeholder="Full Name"
          style="display: none"
        />

        <select
          id="authRole"
          style="
            display: none;
            width: 100%;
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 5px;
            background: #fff;
            color: #000;
            outline: none;
            border: none;
          "
        >
          <option value="Customer">Customer Account</option>
          <option value="Admin">Admin Account</option>
        </select>

        <input
          type="email"
          id="authEmail"
          placeholder="Email Address"
          required
        />
        <input
          type="password"
          id="authPassword"
          placeholder="Password"
          required
        />
        <button type="submit" id="authBtn">Log In</button>
      </form>

      <p class="toggle-text" onclick="toggleAuthMode()">
        <span id="authToggleText">Don't have an account? Sign up here.</span>
      </p>
    </div>

    <script>
      let isLoginMode = true;

      function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById("authTitle").innerText = isLoginMode
          ? "Log In"
          : "Sign Up";
        document.getElementById("authBtn").innerText = isLoginMode
          ? "Log In"
          : "Sign Up";
        document.getElementById("authName").style.display = isLoginMode
          ? "none"
          : "block";
        document.getElementById("authRole").style.display = isLoginMode
          ? "none"
          : "block";
        document.getElementById("authName").required = !isLoginMode;
        document.getElementById("authToggleText").innerText = isLoginMode
          ? "Don't have an account? Sign up here."
          : "Already have an account? Log in here.";
      }

      async function handleAuth(event) {
        event.preventDefault();

        const name = document.getElementById("authName").value;
        const email = document.getElementById("authEmail").value;
        const password = document.getElementById("authPassword").value;
        const role = document.getElementById("authRole").value;

        const url = isLoginMode
          ? "http://localhost:3000/api/login"
          : "http://localhost:3000/api/signup";
        const payload = isLoginMode
          ? { email, password }
          : { name, email, password, role };

        try {
          const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const data = await response.json();

          if (response.ok) {
            alert(data.message);
            if (isLoginMode) {
              localStorage.setItem("wildlifeUser", JSON.stringify(data.user));
              window.location.href = "index.html";
            } else {
              toggleAuthMode();
            }
          } else {
            alert(data.message);
          }
        } catch (error) {
          console.error("Error:", error);
          alert("Server error. Please try again.");
        }
      }
    </script>
  </body>
</html>
