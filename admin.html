<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Print Orders</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Specific styles for the admin table */
    .admin-container { max-width: 1000px; margin: 100px auto; padding: 20px; background: #161616; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: left; }
    th, td { padding: 12px; border-bottom: 1px solid #333; }
    th { background: #e63946; color: #fff; }
    .thumbnail { max-width: 80px; border-radius: 4px; }
  </style>
</head>
<body>

<div class="menu-btn" onclick="window.location.href='index.html'">← Back to Site</div>

<div class="admin-container">
  <h2>Print Orders Dashboard</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Image</th>
        <th>Customer Name</th>
        <th>Email</th>
        <th>Size</th>
        <th>Address</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="orderTableBody">
      <tr><td colspan="7" style="text-align: center;">Loading orders...</td></tr>
    </tbody>
  </table>
</div>

<script>
  // Fetch orders from the backend when the page loads
  async function loadOrders() {
    try {
      const response = await fetch('http://localhost:3000/api/orders');
      const orders = await response.json();
      
      const tableBody = document.getElementById('orderTableBody');
      tableBody.innerHTML = ''; // Clear loading text
      
      if (orders.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No orders found.</td></tr>';
        return;
      }

      // Loop through each order and create a table row
      orders.forEach(order => {
        const row = `
          <tr>
            <td>#${order.ORDER_ID}</td>
            <td><img src="${order.IMAGE_URL}" class="thumbnail" alt="Print"></td>
            <td>${order.CUSTOMER_NAME}</td>
            <td><a href="mailto:${order.CUSTOMER_EMAIL}" style="color: #2a9d8f;">${order.CUSTOMER_EMAIL}</a></td>
            <td>${order.PRINT_SIZE}</td>
            <td>${order.SHIPPING_ADDRESS}</td>
            <td style="font-weight: bold; color: #e9c46a;">${order.ORDER_STATUS}</td>
          </tr>
        `;
        tableBody.innerHTML += row;
      });
    } catch (error) {
      console.error('Error fetching orders:', error);
      document.getElementById('orderTableBody').innerHTML = '<tr><td colspan="7" style="text-align: center; color: #e63946;">Failed to load orders. Is the server running?</td></tr>';
    }
  }

  // Run the function on load
  loadOrders();
</script>

</body>
</html>
